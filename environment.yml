# Hackathon environment for the BMTK/NEST point-neuron notebooks.
#
#   mamba env create -f environment.yml   # or: conda env create -f environment.yml
#   conda activate neuroworkflow-hackathon
#
# NEST, h5py and numpy come from conda-forge so this path works on all
# platforms (incl. older macOS / Linux aarch64); neuroworkflow + bmtk come from
# pip. For a lighter venv+pip alternative using NEST's PyPI wheels, see
# HACKATHON_SETUP.md.
name: neuroworkflow-hackathon
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  # ABI-linked native stack from conda-forge (h5py here avoids the HDF5
  # wheel-vs-system conflict that Dockerfile.nest had to hand-patch):
  - nest-simulator>=3.8,<3.11
  - h5py>=3.10
  - numpy>=1.24            # conda resolves the nest/h5py-compatible numpy 2.x
  - matplotlib-base>=3.6   # -base avoids pulling Qt we don't need
  # notebook execution / smoke-test tooling:
  - jupyterlab
  - nbconvert
  - ipykernel
  # neuroworkflow[pointnet] (which pulls bmtk) is installed with pip by
  # setup_hackathon.sh, or the documented `pip install -e ".[pointnet]"` step.
  # Kept out of this file so `conda env create -f environment.yml` has no
  # implicit repo-root dependency and there is no redundant double-install.
