<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 950" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .title { font-size: 18px; font-weight: 700; fill: #1a1a2e; }
      .layer-title { font-size: 14px; font-weight: 600; fill: #16213e; }
      .box-title { font-size: 12px; font-weight: 600; fill: #0f3460; }
      .box-desc { font-size: 10px; fill: #533483; }
      .port { font-size: 9px; fill: #666; }
      .arrow-label { font-size: 9px; fill: #333; }
      .boundary { fill: none; stroke: #c4b5d6; stroke-width: 1.5; stroke-dasharray: 6 4; }
      .connector { stroke: #4a5568; stroke-width: 1.5; fill: none; }
      .connector-http { stroke: #2b6cb0; }
      .connector-lib { stroke: #276749; }
      .connector-db { stroke: #9c4221; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrowhead-http" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2b6cb0"/>
    </marker>
    <marker id="arrowhead-lib" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#276749"/>
    </marker>
    <marker id="arrowhead-db" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9c4221"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="950" fill="#f7fafc"/>

  <!-- Main title -->
  <text x="600" y="32" text-anchor="middle" class="title">NeuroWorkflow - Full-Scale Architecture</text>

  <!-- ========== LAYER 1: User interfaces ========== -->
  <rect x="20" y="52" width="1160" height="118" class="boundary" rx="4"/>
  <text x="30" y="72" class="layer-title">User interfaces</text>

  <rect x="40" y="82" width="200" height="78" fill="#e6fffa" stroke="#38b2ac" stroke-width="1.5" rx="4"/>
  <text x="140" y="102" text-anchor="middle" class="box-title">Web UI (React)</text>
  <text x="140" y="116" text-anchor="middle" class="box-desc">Visual editor, React Flow</text>
  <text x="140" y="130" text-anchor="middle" class="box-desc">Node management, params</text>
  <text x="140" y="144" text-anchor="middle" class="port">Port: 5173</text>

  <rect x="260" y="82" width="180" height="78" fill="#fef5e7" stroke="#d68910" stroke-width="1.5" rx="4"/>
  <text x="350" y="102" text-anchor="middle" class="box-title">Python API / CLI</text>
  <text x="350" y="116" text-anchor="middle" class="box-desc">neuroworkflow run &lt;file&gt;</text>
  <text x="350" y="130" text-anchor="middle" class="box-desc">Programmatic workflows</text>
  <text x="350" y="144" text-anchor="middle" class="port">src/neuroworkflow</text>

  <rect x="460" y="82" width="180" height="78" fill="#fce8f0" stroke="#c2185b" stroke-width="1.5" rx="4"/>
  <text x="550" y="102" text-anchor="middle" class="box-title">Jupyter Notebooks</text>
  <text x="550" y="116" text-anchor="middle" class="box-desc">Interactive exploration</text>
  <text x="550" y="130" text-anchor="middle" class="box-desc">Generated .ipynb</text>
  <text x="550" y="144" text-anchor="middle" class="port">examples, notebooks/</text>

  <rect x="660" y="82" width="180" height="78" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5" rx="4"/>
  <text x="750" y="102" text-anchor="middle" class="box-title">LLM / Cursor</text>
  <text x="750" y="116" text-anchor="middle" class="box-desc">MCP workflow tools</text>
  <text x="750" y="130" text-anchor="middle" class="box-desc">List projects, get flow</text>
  <text x="750" y="144" text-anchor="middle" class="port">via MCP proxy</text>

  <rect x="860" y="82" width="160" height="78" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5" rx="4"/>
  <text x="940" y="102" text-anchor="middle" class="box-title">BrainScaler (opt)</text>
  <text x="940" y="116" text-anchor="middle" class="box-desc">Knowledge graph + AI</text>
  <text x="940" y="130" text-anchor="middle" class="box-desc">Links to workflow UI</text>
  <text x="940" y="144" text-anchor="middle" class="port">Port: 5001</text>

  <rect x="1040" y="82" width="120" height="78" fill="#fff3e0" stroke="#e65100" stroke-width="1.5" rx="4"/>
  <text x="1100" y="102" text-anchor="middle" class="box-title">RAG UI (opt)</text>
  <text x="1100" y="116" text-anchor="middle" class="box-desc">Parameter search</text>
  <text x="1100" y="130" text-anchor="middle" class="box-desc">Papers/chunks</text>
  <text x="1100" y="144" text-anchor="middle" class="port">Port: 3010</text>

  <!-- ========== LAYER 2: Backend services ========== -->
  <rect x="20" y="188" width="1160" height="130" class="boundary" rx="4"/>
  <text x="30" y="208" class="layer-title">Backend services</text>

  <rect x="80" y="218" width="220" height="90" fill="#bee3f8" stroke="#2b6cb0" stroke-width="1.5" rx="4"/>
  <text x="190" y="238" text-anchor="middle" class="box-title">Django REST API</text>
  <text x="190" y="252" text-anchor="middle" class="box-desc">Workflow CRUD, flow, nodes, edges</text>
  <text x="190" y="266" text-anchor="middle" class="box-desc">Code generation, run, box, metadata</text>
  <text x="190" y="280" text-anchor="middle" class="port">gui/workflow_backend &#183; Port: 3000</text>
  <text x="190" y="294" text-anchor="middle" class="port">api/auth, api/box, api/workflow, api/metadata</text>

  <rect x="320" y="218" width="200" height="90" fill="#c6f6d5" stroke="#276749" stroke-width="1.5" rx="4"/>
  <text x="420" y="238" text-anchor="middle" class="box-title">JupyterHub</text>
  <text x="420" y="252" text-anchor="middle" class="box-desc">Spawns NEST/JupyterLab</text>
  <text x="420" y="266" text-anchor="middle" class="box-desc">DockerSpawner</text>
  <text x="420" y="280" text-anchor="middle" class="port">neuroworkflow/ &#183; Port: 8000</text>

  <rect x="540" y="218" width="200" height="90" fill="#e9d8fd" stroke="#6b46c1" stroke-width="1.5" rx="4"/>
  <text x="640" y="238" text-anchor="middle" class="box-title">MCP Server</text>
  <text x="640" y="252" text-anchor="middle" class="box-desc">FastMCP proxy</text>
  <text x="640" y="266" text-anchor="middle" class="box-desc">Workflow tools &#8594; Django API</text>
  <text x="640" y="280" text-anchor="middle" class="port">gui/mcp_server &#183; Port: 8001</text>

  <rect x="760" y="218" width="240" height="90" fill="#fed7d7" stroke="#c53030" stroke-width="1.5" rx="4"/>
  <text x="880" y="238" text-anchor="middle" class="box-title">Local RAG Backend (optional)</text>
  <text x="880" y="252" text-anchor="middle" class="box-desc">FastAPI &#183; semantic search</text>
  <text x="880" y="266" text-anchor="middle" class="box-desc">Papers/chunks for params</text>
  <text x="880" y="280" text-anchor="middle" class="port">rag/ &#183; Port: 8006</text>

  <rect x="1020" y="218" width="140" height="90" fill="#feebc8" stroke="#c05621" stroke-width="1.5" rx="4"/>
  <text x="1090" y="248" text-anchor="middle" class="box-title">Supabase</text>
  <text x="1090" y="262" text-anchor="middle" class="box-desc">Auth (backend +</text>
  <text x="1090" y="276" text-anchor="middle" class="box-desc">frontend)</text>

  <!-- ========== LAYER 3: Core library ========== -->
  <rect x="20" y="336" width="1160" height="200" class="boundary" rx="4"/>
  <text x="30" y="356" class="layer-title">Core library (src/neuroworkflow)</text>

  <rect x="40" y="366" width="200" height="158" fill="#e6fffa" stroke="#38b2ac" stroke-width="1.5" rx="4"/>
  <text x="140" y="386" text-anchor="middle" class="box-title">core/</text>
  <text x="140" y="402" text-anchor="middle" class="box-desc">node.py (Node base)</text>
  <text x="140" y="416" text-anchor="middle" class="box-desc">port.py (Input/Output)</text>
  <text x="140" y="430" text-anchor="middle" class="box-desc">schema.py (definitions)</text>
  <text x="140" y="444" text-anchor="middle" class="box-desc">workflow.py (Workflow,</text>
  <text x="140" y="458" text-anchor="middle" class="box-desc">WorkflowBuilder)</text>
  <text x="140" y="472" text-anchor="middle" class="box-desc">Execution order</text>
  <text x="140" y="506" text-anchor="middle" class="port">Port types, params</text>

  <rect x="260" y="366" width="220" height="158" fill="#fef5e7" stroke="#d68910" stroke-width="1.5" rx="4"/>
  <text x="370" y="386" text-anchor="middle" class="box-title">nodes/</text>
  <text x="370" y="402" text-anchor="middle" class="box-desc">network, simulation</text>
  <text x="370" y="416" text-anchor="middle" class="box-desc">stimulus, analysis</text>
  <text x="370" y="430" text-anchor="middle" class="box-desc">optimization, io</text>
  <text x="370" y="444" text-anchor="middle" class="box-desc">NODE_DEFINITION, process</text>
  <text x="370" y="458" text-anchor="middle" class="box-desc">generate_python_script()</text>
  <text x="370" y="486" text-anchor="middle" class="port">Uses core/</text>
  <text x="370" y="506" text-anchor="middle" class="port">Simulation backends (NEST, TVB, SONATA)</text>

  <rect x="500" y="366" width="260" height="158" fill="#e8eaf6" stroke="#3949ab" stroke-width="1.5" rx="4"/>
  <text x="630" y="386" text-anchor="middle" class="box-title">utils/</text>
  <text x="630" y="402" text-anchor="middle" class="box-desc">script_exporter (Python, .ipynb, SnakeMake)</text>
  <text x="630" y="416" text-anchor="middle" class="box-desc">snakemake_generator</text>
  <text x="630" y="430" text-anchor="middle" class="box-desc">job_managers (SLURM, etc.)</text>
  <text x="630" y="444" text-anchor="middle" class="box-desc">parameter_metadata_service</text>
  <text x="630" y="458" text-anchor="middle" class="box-desc">database_adapters (see right)</text>
  <text x="630" y="472" text-anchor="middle" class="box-desc">mcp/server</text>
  <text x="630" y="506" text-anchor="middle" class="port">OpenAI (optional), timeouts</text>

  <rect x="780" y="366" width="380" height="158" fill="#f3e5f5" stroke="#7b1fa2" stroke-width="1.5" rx="4"/>
  <text x="970" y="386" text-anchor="middle" class="box-title">Database adapters (ParameterMetadataService)</text>
  <text x="880" y="408" text-anchor="middle" class="box-desc">AllenBrain &#183; NeuroMorpho &#183; PubMed &#183; NeuroMLDB</text>
  <text x="970" y="424" text-anchor="middle" class="box-desc">GenericDatabaseAdapter (custom HTTP/API)</text>
  <text x="970" y="440" text-anchor="middle" class="box-desc">LocalRAGAdapter &#8594; Local RAG backend</text>
  <text x="970" y="456" text-anchor="middle" class="box-desc">ParameterSuggestion (value, source, confidence)</text>
  <text x="970" y="472" text-anchor="middle" class="box-desc">Species-specific, citations</text>
  <text x="970" y="506" text-anchor="middle" class="port">Used by Django app.metadata</text>

  <rect x="118" y="534" width="124" height="90" fill="#fff8e1" stroke="#ff8f00" stroke-width="1.5" rx="4"/>
  <text x="180" y="554" text-anchor="middle" class="box-title">cli/</text>
  <text x="180" y="570" text-anchor="middle" class="box-desc">neuroworkflow run</text>
  <text x="180" y="584" text-anchor="middle" class="box-desc">info, etc.</text>
  <text x="180" y="606" text-anchor="middle" class="port">Entry: cli.commands:main</text>

  <!-- ========== LAYER 4: Data and external ========== -->
  <rect x="20" y="554" width="1160" height="200" class="boundary" rx="4"/>
  <text x="30" y="574" class="layer-title">Data stores &amp; external systems</text>

  <rect x="80" y="594" width="200" height="148" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5" rx="4"/>
  <text x="180" y="614" text-anchor="middle" class="box-title">PostgreSQL</text>
  <text x="180" y="630" text-anchor="middle" class="box-desc">FlowProject, FlowNode, FlowEdge</text>
  <text x="180" y="646" text-anchor="middle" class="box-desc">PythonFile (box)</text>
  <text x="180" y="662" text-anchor="middle" class="box-desc">CustomDatabase (metadata)</text>
  <text x="180" y="678" text-anchor="middle" class="port">Docker: db (workflow network)</text>
  <text x="180" y="694" text-anchor="middle" class="port">Django DATABASES.default</text>
  <text x="180" y="724" text-anchor="middle" class="port">Port: 5432 (internal)</text>

  <rect x="300" y="594" width="160" height="148" fill="#bbdefb" stroke="#1976d2" stroke-width="1.5" rx="4"/>
  <text x="380" y="614" text-anchor="middle" class="box-title">Allen Brain Atlas</text>
  <text x="380" y="638" text-anchor="middle" class="box-desc">Adapter HTTP</text>
  <text x="380" y="662" text-anchor="middle" class="box-desc">Parameter metadata</text>

  <rect x="480" y="594" width="140" height="148" fill="#d1c4e9" stroke="#512da8" stroke-width="1.5" rx="4"/>
  <text x="550" y="614" text-anchor="middle" class="box-title">NeuroMorpho</text>
  <text x="550" y="638" text-anchor="middle" class="box-desc">Adapter HTTP</text>

  <rect x="640" y="594" width="120" height="148" fill="#ffccbc" stroke="#d84315" stroke-width="1.5" rx="4"/>
  <text x="700" y="614" text-anchor="middle" class="box-title">PubMed</text>
  <text x="700" y="638" text-anchor="middle" class="box-desc">Adapter</text>

  <rect x="780" y="594" width="130" height="148" fill="#b2dfdb" stroke="#00796b" stroke-width="1.5" rx="4"/>
  <text x="845" y="614" text-anchor="middle" class="box-title">NeuroML-DB</text>
  <text x="845" y="638" text-anchor="middle" class="box-desc">Adapter</text>

  <rect x="930" y="594" width="120" height="148" fill="#ffe0b2" stroke="#e65100" stroke-width="1.5" rx="4"/>
  <text x="990" y="614" text-anchor="middle" class="box-title">Custom DBs</text>
  <text x="990" y="638" text-anchor="middle" class="box-desc">Generic adapter</text>
  <text x="990" y="662" text-anchor="middle" class="box-desc">api/metadata</text>
  <text x="990" y="686" text-anchor="middle" class="box-desc">custom-databases</text>

  <rect x="1070" y="594" width="90" height="148" fill="#f8bbd0" stroke="#c2185b" stroke-width="1.5" rx="4"/>
  <text x="1115" y="614" text-anchor="middle" class="box-title">Local RAG</text>
  <text x="1115" y="638" text-anchor="middle" class="box-desc">HTTP 8006</text>

  <!-- Simulation backends (small strip) -->
  <rect x="80" y="758" width="1080" height="44" fill="#eceff1" stroke="#546e7a" stroke-width="1" rx="4"/>
  <text x="620" y="778" text-anchor="middle" class="box-title">Simulation backends (used by nodes/)</text>
  <text x="620" y="794" text-anchor="middle" class="box-desc">NEST Simulator &#183; TVB (The Virtual Brain) &#183; SONATA &#183; Custom</text>

  <!-- ========== ARROWS: User to Backend (staggered to reduce overlap) ========== -->
  <!-- Web UI to Django -->
  <path d="M 140 160 L 140 218" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <text x="155" y="192" class="arrow-label">HTTP /api</text>
  <!-- Python/CLI to Core: route down left side -->
  <path d="M 350 160 L 350 280 L 220 280 L 220 336 L 180 366" class="connector connector-lib" marker-end="url(#arrowhead-lib)"/>
  <text x="260" y="272" class="arrow-label">import, run</text>
  <!-- Jupyter to JupyterHub -->
  <path d="M 550 160 L 420 218" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <text x="500" y="198" class="arrow-label">notebooks</text>
  <!-- LLM to MCP -->
  <path d="M 750 160 L 640 218" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <text x="700" y="192" class="arrow-label">MCP</text>

  <!-- ========== ARROWS: Backend to Core and Data (staggered exit points) ========== -->
  <!-- Django to PostgreSQL: left side vertical -->
  <path d="M 185 308 L 185 336 L 185 594" class="connector connector-db" marker-end="url(#arrowhead-db)"/>
  <text x="205" y="458" class="arrow-label">Django ORM</text>
  <!-- Django to Core: exit right, then down to core/ -->
  <path d="M 270 308 L 270 336 L 370 336" class="connector connector-lib" marker-end="url(#arrowhead-lib)"/>
  <text x="268" y="328" class="arrow-label">WorkflowBuilder, run</text>
  <!-- Django to utils: exit further right, then across and down -->
  <path d="M 300 308 L 465 308 L 465 336 L 630 366" class="connector connector-lib" marker-end="url(#arrowhead-lib)"/>
  <text x="395" y="318" class="arrow-label">ParameterMetadataService</text>
  <!-- MCP to Django -->
  <path d="M 540 218 L 300 218" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <text x="420" y="210" class="arrow-label">DJANGO_API_URL</text>
  <!-- Local RAG adapter (utils) to Local RAG backend -->
  <path d="M 960 480 L 960 280 L 880 280 L 880 308" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <text x="932" y="388" class="arrow-label">LOCAL_RAG_BASE_URL</text>
  <!-- Frontend to Supabase: route along top then down -->
  <path d="M 240 160 L 240 148 L 1000 148 L 1000 248 L 1090 248" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <text x="600" y="138" class="arrow-label">VITE_SUPABASE (auth)</text>
  <!-- Backend to Supabase -->
  <path d="M 300 218 L 1020 248" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <text x="650" y="238" class="arrow-label">SUPABASE_* (auth)</text>

  <!-- ========== ARROWS: Database adapters to External DBs (spaced vertically) ========== -->
  <path d="M 880 524 L 380 594" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <path d="M 900 540 L 550 594" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <path d="M 920 556 L 700 594" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <path d="M 940 524 L 845 594" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <path d="M 960 540 L 990 594" class="connector connector-http" marker-end="url(#arrowhead-http)"/>
  <path d="M 1140 524 L 1115 594" class="connector connector-http" marker-end="url(#arrowhead-http)"/>

  <!-- nodes/ to Simulation backends -->
  <path d="M 370 524 L 370 758" class="connector" marker-end="url(#arrowhead)"/>
  <text x="395" y="648" class="arrow-label">NEST, TVB, SONATA</text>

  <!-- Legend -->
  <rect x="20" y="848" width="1160" height="88" fill="#edf2f7" stroke="#a0aec0" stroke-width="1" rx="4"/>
  <text x="30" y="870" class="layer-title">Legend</text>
  <line x1="30" y1="882" x2="80" y2="882" class="connector-http" stroke-width="3"/>
  <text x="90" y="886" class="box-desc">HTTP / REST</text>
  <line x1="220" y1="882" x2="270" y2="882" class="connector-lib" stroke-width="3"/>
  <text x="280" y="886" class="box-desc">Python import / subprocess</text>
  <line x1="480" y1="882" x2="530" y2="882" class="connector-db" stroke-width="3"/>
  <text x="540" y="886" class="box-desc">Database (ORM)</text>
  <text x="30" y="912" class="port">Ports: Frontend 5173 | Backend 3000 | MCP 8001 | JupyterHub 8000 | Local RAG 8006 (backend), 3010 (UI) | BrainScaler 5001 | PostgreSQL 5432 (internal)</text>
</svg>
