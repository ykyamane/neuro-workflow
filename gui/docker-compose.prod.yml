# Production override for RIKEN deployment.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This override keeps the base compose file usable for local development while
# applying production runtime settings for snnbuilder.riken.jp.
#
# Requires Docker Compose with YAML merge tag support (`!override` / `!reset`),
# e.g. Docker Compose v2.24.4+.

services:
  backend:
    command: bash -c "python3 django-project/manage.py migrate --noinput && cd django-project && gunicorn config.wsgi:application --bind 0.0.0.0:3000 --workers ${GUNICORN_WORKERS:-3} --timeout ${GUNICORN_TIMEOUT:-180}"
    # Mount the passphrase-protected SSH key read-only for the remote Slurm
    # backend. An admin unlocks it once per restart via:
    #   docker exec -e SSH_AUTH_SOCK=/tmp/ssh-agent.sock -it <backend> \
    #       ssh-add /root/.ssh/id_ed25519
    # (Appended to the base service's volumes; the key is never written to.)
    volumes:
      - ${SLURM_SSH_KEY_HOST:-/root/.ssh/id_ed25519}:/root/.ssh/id_ed25519:ro
    environment:
      - MCP_SERVER_URL=http://mcp:8001
      - ALLOWED_HOSTS_ALL=false
      - ALLOWED_HOSTS_EXTRA=${ALLOWED_HOSTS_EXTRA:-snnbuilder.riken.jp}
      - CORS_ALLOWED_ORIGINS_EXTRA=${CORS_ALLOWED_ORIGINS_EXTRA:-https://snnbuilder.riken.jp}
      - CSRF_TRUSTED_ORIGINS_EXTRA=${CSRF_TRUSTED_ORIGINS_EXTRA:-https://snnbuilder.riken.jp}
      - DJANGO_DEBUG=${DJANGO_DEBUG:-false}
      - JUPYTERHUB_BASE_URL=${JUPYTERHUB_BASE_URL:-/jupyter/}
      # --- Remote Slurm execution (RIKEN compute server) ---------------------
      # Additive and OFF by default: these only take effect when a workflow run
      # is submitted with backend=slurm. SLURM_SSH_KEY is intentionally NOT set
      # so the executor authenticates via the ssh-agent (see entrypoint.sh).
      - SSH_AUTH_SOCK=/tmp/ssh-agent.sock
      - SLURM_HOST=${SLURM_HOST:-digitalbrain.brainminds.jp}
      - SLURM_USER=${SLURM_USER:-neuro-workflow}
      - SLURM_REMOTE_DIR=${SLURM_REMOTE_DIR:-/data/neuro-workflow/runs}
      - SLURM_PARTITION=${SLURM_PARTITION:-ccalc}
      - SLURM_ACCOUNT=${SLURM_ACCOUNT:-neuro-workflow}
      - SLURM_REMOTE_VENV=${SLURM_REMOTE_VENV:-/data/neuro-workflow/local/venv}
      - SLURM_PYTHON_MODULE=${SLURM_PYTHON_MODULE:-python/3.11.14}

  jupyterhub:
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - JUPYTERHUB_API_TOKEN=${JUPYTERHUB_API_TOKEN:-dev-token-change-in-production}
      - JUPYTERHUB_ALLOWED_USERS=${JUPYTERHUB_ALLOWED_USERS:-user1}
      - JUPYTERHUB_AUTHENTICATOR=firstuse
      - JUPYTERHUB_BASE_URL=${JUPYTERHUB_BASE_URL:-/jupyter/}
      - JUPYTERHUB_COOKIE_SECURE=true
      - JUPYTERHUB_COOKIE_SAMESITE=None
      - JUPYTERHUB_FRAME_ORIGIN=${JUPYTERHUB_FRAME_ORIGIN:-https://snnbuilder.riken.jp}
      - JUPYTER_GRANT_SUDO=no

  frontend:
    build:
      context: ./workflow_frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_BASE_URL: /api
        VITE_JUPYTER_BASE_URL: /jupyter
        VITE_MCP_BASE_URL: /mcp
        VITE_KEYCLOAK_URL: /auth
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-neuroworkflow}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-neuroworkflow-app}
    command: ["nginx", "-g", "daemon off;"]
    ports: !override
      - "${BIND_HOST:-127.0.0.1}:5173:80"
    volumes: !reset []
    environment:
      - VITE_API_BASE_URL=/api
      - VITE_JUPYTER_BASE_URL=/jupyter
      - VITE_MCP_BASE_URL=/mcp

  keycloak:
    command: start
    environment:
      - KC_DB=postgres
      - KC_DB_URL=jdbc:postgresql://keycloak-db:5432/keycloak
      - KC_DB_USERNAME=keycloak
      - KC_DB_PASSWORD=${KEYCLOAK_DB_PASSWORD:-keycloak}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - KC_PROXY_HEADERS=xforwarded
      - KC_HTTP_RELATIVE_PATH=/auth
      - KC_HTTP_ENABLED=true
      # No KC_HOSTNAME: with hostname-strict=false Keycloak derives the public
      # hostname per-request (from the proxied Host/X-Forwarded-* headers), so
      # login works on every domain it is served on (snnbuilder.riken.jp,
      # neuro-workflow.dbrain.jp, www.dbrain.jp). Pinning it to one host makes
      # the login form POST cross-host from the other domains and breaks auth.
      - KC_HOSTNAME_STRICT=false
