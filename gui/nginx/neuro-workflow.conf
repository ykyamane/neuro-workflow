# Nginx reverse-proxy config for NeuroWorkflow (RIKEN deployment).
#
# Install:
#   sudo cp gui/nginx/neuro-workflow.conf /etc/nginx/sites-available/neuro-workflow
#   sudo ln -sf /etc/nginx/sites-available/neuro-workflow /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# All Docker services bind to 127.0.0.1 only (see docker-compose.yml BIND_HOST).
# This file is the reference config; the server admin may adapt it.

upstream frontend_upstream {
    server 127.0.0.1:5173;
}

upstream backend_upstream {
    server 127.0.0.1:3000;
}

upstream jupyterhub_upstream {
    server 127.0.0.1:8000;
}

upstream mcp_upstream {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # ── Frontend (Vite dev server) ──────────────────────────────────────
    location / {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Vite HMR)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Django API ──────────────────────────────────────────────────────
    # /api/ is passed through with the prefix intact (Django urls.py expects it).
    location /api/ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for chat streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # ── JupyterHub ──────────────────────────────────────────────────────
    # /jupyter/ strips the prefix; JupyterHub expects paths at root.
    location /jupyter/ {
        proxy_pass http://jupyterhub_upstream/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (Jupyter kernels)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 86400s;
    }

    # ── MCP Proxy ───────────────────────────────────────────────────────
    location /mcp/ {
        proxy_pass http://mcp_upstream/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming support
        proxy_buffering off;
        proxy_cache off;
    }

    # ── Keycloak (Phase 2 — uncomment when ready) ──────────────────────
    # location /auth/ {
    #     proxy_pass http://127.0.0.1:8080/auth/;
    #     proxy_set_header Host              $host;
    #     proxy_set_header X-Real-IP         $remote_addr;
    #     proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
}
